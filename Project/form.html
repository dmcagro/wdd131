<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review</title>

    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>

    <header>
        <h1>Product Review</h1>
    </header>

    <main>
        <form method="get" action="review.html">

            <!-- Product Name -->
            <div class="form-group">
                <label for="productName">Product Name</label>

                <select id="productName" name="productName" required>
                    <option value="" disabled selected>
                        Choose a Product ...
                    </option>
                </select>
            </div>

            <!-- Overall Rating -->
            <div class="form-group">
                <label>Overall Rating</label>

                <div class="rating">

                    <label>
                        ★
                        <input type="radio" id="star1" name="rating" value="1" required>
                    </label>

                    <label>
                        ★★
                        <input type="radio" id="star2" name="rating" value="2">
                    </label>

                    <label>
                        ★★★
                        <input type="radio" id="star3" name="rating" value="3">
                    </label>

                    <label>
                        ★★★★
                        <input type="radio" id="star4" name="rating" value="4">
                    </label>

                    <label>
                        ★★★★★
                        <input type="radio" id="star5" name="rating" value="5">
                    </label>

                </div>
            </div>

            <!-- Date -->
            <div class="form-group">
                <label for="installDate">Date of Installation</label>

                <input type="date" id="installDate" name="installDate" required>
            </div>

            <!-- Features -->
            <div class="form-group">
                <label>
                    Which features did you find useful in the product?
                    <br>
                    <em>(Check all that apply)</em>
                </label>

                <div class="features">

                    <label>
                        <input type="checkbox" id="durability" name="features" value="Durability">
                        Durability
                    </label>

                    <label>
                        <input type="checkbox" id="ease" name="features" value="Ease of Use">
                        Ease of Use
                    </label>

                    <label>
                        <input type="checkbox" id="performance" name="features" value="Performance">
                        Performance
                    </label>

                    <label>
                        <input type="checkbox" id="design" name="features" value="Design">
                        Design
                    </label>

                </div>
            </div>

            <!-- Review -->
            <div class="form-group">
                <label for="review">
                    Written Review
                    <span class="optional">(Optional)</span>
                </label>

                <textarea id="review" name="review" rows="6"></textarea>
            </div>

            <!-- User Name -->
            <div class="form-group">
                <label for="userName">
                    Your Name
                    <span class="optional">(Optional)</span>
                </label>

                <input type="text" id="userName" name="userName">
            </div>

            <!-- Submit -->
            <input type="submit" value="Post Review" class="submit-btn">

        </form>
    </main>

    <footer>
        <p>
            &copy;2026 🌸 Olusola Onoja 🌸
        </p>

        <p id="lastModified"></p>
    </footer>

    <script>
        document.getElementById("lastModified").textContent =
            "Last Modification: " + document.lastModified;
    </script>

</body>

</html>
